name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Attest release assets
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            manifest.json
            main.js
            styles.css

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Aliyun Drive Sync ${{ github.ref_name }}
          body: |
            Community submission compatibility release.

            - Uses the compliant plugin ID `aliyun-drive-sync`.
            - Includes the required Obsidian release assets.
          files: |
            manifest.json
            main.js
            styles.css
